
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かっぱ寿司 元取り計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="pb-24">

<div id="status-bar" class="fixed top-0 left-0 w-full shadow-md z-50 transition-colors duration-500" style="background-color: rgb(255, 255, 255);">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center p-3 pb-1">
            <h1 class="text-lg font-bold text-gray-800">🍣 食べホー元取り計算機</h1>
            <button onclick="resetAll()" class="text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded-full font-bold shadow-sm flex items-center gap-1 active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
                リセット
            </button>
        </div>

        <div class="flex justify-between items-end px-3 pb-2 border-b border-gray-100">
            <span class="text-sm text-gray-500 font-bold">目標: <span id="target-price">2,990</span>円</span>
            <span class="text-3xl font-extrabold text-gray-800">計 <span id="total-price">0</span><span class="text-base font-bold">円</span></span>
        </div>

        <div class="px-3 py-2">
            <div id="message-box" class="bg-red-100 text-red-700 p-1.5 rounded-lg font-bold text-sm shadow-inner text-center transition-all">
                データを読み込み中...
            </div>
        </div>

        <div id="tabs-container" class="flex overflow-x-auto bg-gray-50 hide-scrollbar border-b shadow-sm">
            <!-- JSでタブが生成されます -->
        </div>
    </div>
</div>

<div class="max-w-md mx-auto mt-48 px-3">
    <div id="menu-container" class="space-y-2 pt-2">
        <div class="text-center py-10">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-500 mx-auto mb-4"></div>
            <p class="text-gray-500 font-bold text-sm">インターネット経由で<br>メニューを取得中...</p>
        </div>
    </div>
</div>

<script>
    // ⭐️ いただいたURLをセット済みです
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxBt63cNk3rc3RzrdCmUlGheKY47O4k3B9hNl5zgrJJ4DeYTJMf0S1iWXK7FQbxkdVZVg/exec"; 

    const TARGET_PRICE = 2990; 
    const categories = [
        { id: 'nigiri', name: 'にぎり' },
        { id: 'gunkan', name: '軍艦・巻物' },
        { id: 'side', name: 'サイドメニュー' },
        { id: 'sweets', name: 'スイーツ' }
    ];

    let currentTab = 'nigiri';
    let itemMap = {};
    let isDataLoaded = false;
    let currentPage = 1;
    const ITEMS_PER_PAGE = 5;

    // --- 1. インターネット(fetch)経由でのデータ読み込み ---
    document.addEventListener('DOMContentLoaded', () => {
        
        // ⭐️ 修正：URLが「http」から始まっていない場合のみ未設定エラーにする（誤作動防止）
        if (!GAS_API_URL.startsWith("http")) {
            showErrorHTML("⚠️ URLが未設定です", "<code>index.html</code> のコード内にある <code>GAS_API_URL</code> に、GASで発行したURLを貼り付けてからGitHubにアップロードしてください。");
            return;
        }

        // 通信が10秒以上かかったら強制終了(タイムアウト)させる設定
        const controller = new AbortController();
        const timeoutId = setTimeout(() => {
            controller.abort();
            showErrorHTML("⚠️ 通信エラー（タイムアウト）", "10秒待機しましたがGASから応答がありません。<br>GAS側の設定（アクセス権限が「全員」になっているか等）を確認してください。");
        }, 10000);

        // fetchを使ってGASにデータを注文する
        fetch(GAS_API_URL, { 
            method: 'GET', // データをもらうだけなのでGET
            signal: controller.signal 
        })
        .then(response => {
            clearTimeout(timeoutId); // 成功したらタイムアウトのタイマーを止める
            if (!response.ok) {
                throw new Error("サーバーからエラーが返されました (Status: " + response.status + ")");
            }
            return response.json(); // 送られてきたデータをJSON（プログラム用データ）として読み込む
        })
        .then(data => {
            onDataLoaded(data); // 読み込み成功時の処理へ
        })
        .catch(error => {
            clearTimeout(timeoutId);
            if (error.name === 'AbortError') return; // タイムアウトの場合は無視（上で処理済み）
            onDataError(error); // 失敗時の処理へ
        });
    });

    function showErrorHTML(title, detail) {
        document.getElementById('menu-container').innerHTML = `
            <div class="text-center py-10 px-4">
                <p class="text-red-500 font-bold text-lg mb-2">${title}</p>
                <div class="text-left text-sm text-gray-700 bg-white p-4 rounded border shadow-sm mt-4">
                    <p class="font-bold mb-2 text-red-600">▼ 詳細・原因</p>
                    <p class="text-xs text-gray-600">${detail}</p>
                </div>
            </div>`;
        const msgBox = document.getElementById('message-box');
        msgBox.innerHTML = '読み込みエラー';
        msgBox.className = 'bg-red-100 text-red-700 p-1.5 rounded-lg font-bold text-sm shadow-inner text-center transition-all';
    }

    function onDataLoaded(serverData) {
        try {
            if (!serverData || !Array.isArray(serverData)) {
                throw new Error("取得したデータが配列ではありませんでした。GAS側が正しくJSONを返しているか確認してください。");
            }

            itemMap = {};
            let itemIdCounter = 1;

            serverData.forEach(item => {
                const id = 'item_' + itemIdCounter++;
                itemMap[id] = {
                    id: id,
                    categoryId: item.categoryId || 'nigiri',
                    name: item.name || '不明な商品',
                    price: Number(item.price) || 0,
                    count: 0
                };
            });

            isDataLoaded = true;
            renderTabs();
            renderMenu();
            updateTotal();

        } catch (e) {
            showErrorHTML("⚠️ データ処理エラー", e.message);
        }
    }

    function onDataError(error) {
        let msg = typeof error === 'object' ? (error.message || JSON.stringify(error)) : error;
        showErrorHTML("⚠️ 通信またはGASエラー", "GASとの通信に失敗しました。<br><br>エラー詳細: " + msg);
    }

    // --- 2. 画面の生成 ---
    function renderTabs() {
        if(!isDataLoaded) return;
        const container = document.getElementById('tabs-container');
        let html = '';
        categories.forEach(cat => {
            const isActive = (cat.id === currentTab);
            const baseClass = "whitespace-nowrap px-4 py-3 text-sm font-bold border-b-2 transition-colors duration-200";
            const colorClass = isActive 
                ? "border-red-500 text-red-600 bg-red-50" 
                : "border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100";
            html += `<button onclick="switchTab('${cat.id}')" class="${baseClass} ${colorClass}">${cat.name}</button>`;
        });
        container.innerHTML = html;
    }

    function renderMenu() {
        if(!isDataLoaded) return;
        const container = document.getElementById('menu-container');
        let html = '';

        const itemsToShow = Object.values(itemMap).filter(item => item.categoryId === currentTab);

        if (itemsToShow.length === 0) {
            html = `<div class="text-center py-10 text-gray-400 font-bold text-sm">このカテゴリのメニューはまだ登録されていません。</div>`;
        } else {
            const totalPages = Math.ceil(itemsToShow.length / ITEMS_PER_PAGE);
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageItems = itemsToShow.slice(startIndex, startIndex + ITEMS_PER_PAGE);

            html += `<div class="space-y-2 pt-2">`;
            pageItems.forEach(item => {
                const bgClass = item.count > 0 ? 'bg-red-50 border-red-100' : 'bg-white border-gray-100';
                html += `
                <div class="${bgClass} p-3 rounded-xl shadow-sm border flex justify-between items-center transition-colors">
                    <div class="flex-1 pr-2">
                        <div class="font-bold text-gray-800 text-sm leading-tight">${item.name}</div>
                        <div class="text-xs text-gray-500 mt-0.5">${item.price}円</div>
                    </div>
                    <div class="flex items-center bg-gray-50 rounded-full border border-gray-200 shadow-sm">
                        <button onclick="updateCount('${item.id}', -1)" class="w-10 h-10 flex justify-center items-center text-gray-500 font-bold text-2xl active:bg-gray-200 rounded-l-full focus:outline-none select-none">-</button>
                        <span id="count-${item.id}" class="w-6 text-center font-extrabold text-gray-800 text-lg select-none">${item.count}</span>
                        <button onclick="updateCount('${item.id}', 1)" class="w-10 h-10 flex justify-center items-center text-red-500 font-bold text-xl active:bg-gray-200 rounded-r-full focus:outline-none select-none">+</button>
                    </div>
                </div>
                `;
            });
            html += `</div>`;

            if (totalPages > 1) {
                html += `
                <div class="flex justify-between items-center mt-6 mb-4 px-2">
                    <button onclick="changePage(-1)" class="w-12 h-12 flex justify-center items-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 active:bg-gray-100 disabled:opacity-30 disabled:active:bg-white transition-opacity" ${currentPage === 1 ? 'disabled' : ''}>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" /></svg>
                    </button>
                    <div class="text-sm font-bold text-gray-500 bg-gray-100 px-4 py-2 rounded-full shadow-inner">
                        ${currentPage} <span class="mx-1 text-xs font-normal">/</span> ${totalPages}
                    </div>
                    <button onclick="changePage(1)" class="w-12 h-12 flex justify-center items-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 active:bg-gray-100 disabled:opacity-30 disabled:active:bg-white transition-opacity" ${currentPage === totalPages ? 'disabled' : ''}>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" /></svg>
                    </button>
                </div>
                `;
            }
        }
        container.innerHTML = html;
    }

    // --- 3. アクション ---
    window.switchTab = function(tabId) {
        currentTab = tabId;
        currentPage = 1; 
        renderTabs();
        renderMenu();
        window.scrollTo(0, 0);
    };

    window.changePage = function(delta) {
        currentPage += delta;
        renderMenu();
        window.scrollTo(0, 0); 
    };

    window.updateCount = function(id, delta) {
        const item = itemMap[id];
        if (!item) return;
        const newCount = item.count + delta;
        if (newCount >= 0) {
            item.count = newCount;
            const countElement = document.getElementById(`count-${id}`);
            if (countElement) countElement.textContent = item.count;
            renderMenu(); 
            updateTotal();
        }
    };

    window.resetAll = function() {
        if(confirm('記録をすべてゼロにリセットしますか？')) {
            for (const id in itemMap) {
                itemMap[id].count = 0;
            }
            renderMenu();
            updateTotal();
        }
    };

    function updateTotal() {
        let total = 0;
        for (const id in itemMap) {
            total += itemMap[id].price * itemMap[id].count;
        }

        document.getElementById('total-price').textContent = total.toLocaleString();
        const statusBar = document.getElementById('status-bar');
        const messageBox = document.getElementById('message-box');
        
        if (total >= TARGET_PRICE) {
            const overAmount = total - TARGET_PRICE;
            statusBar.style.backgroundColor = 'rgb(253, 224, 71)';
            messageBox.className = 'bg-white text-yellow-600 p-1.5 rounded-lg font-extrabold text-sm shadow-sm animate-bounce text-center';
            messageBox.innerHTML = `🎉 祝！元を取りました！ (+${overAmount.toLocaleString()}円)`;
        } else {
            const remaining = TARGET_PRICE - total;
            const ratio = total / TARGET_PRICE;
            const r = Math.round(255 - (255 - 253) * ratio); 
            const g = Math.round(255 - (255 - 224) * ratio); 
            const b = Math.round(255 - (255 - 71) * ratio);  
            statusBar.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
            
            messageBox.className = 'bg-red-100 text-red-700 p-1.5 rounded-lg font-bold text-sm shadow-inner text-center transition-all';
            messageBox.innerHTML = `あと <span class="text-lg">${remaining.toLocaleString()}</span> 円で元が取れます！`;
        }
    }
</script>
</body>
</html>
